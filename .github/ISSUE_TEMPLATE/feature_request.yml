name: ✨ Feature request
description: Suggest an idea or improvement for MindSpark.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please describe the problem first, then the
        solution you have in mind — it helps weigh it against alternatives.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I searched [existing issues](https://github.com/prasadpatil25/MindSpark/issues?q=is%3Aissue) and this isn't already requested.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that's hard or impossible today?
      placeholder: e.g. I can't see which collaborators have opened a shared map.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like MindSpark to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you thought about.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, examples from other tools, or anything else.
    validations:
      required: false
